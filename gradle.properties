# Android build-tools (d8) version and compile SDK used by the dex task.
buildToolsVersion=34.0.0
compileSdk=34
android.useAndroidX=true

# Give the Gradle daemon / D8 dex-merger enough heap. The fixture pulls in full Compose
# (foundation + ui-graphics for the pinch box), and D8's dex merge OOMs on the default
# ~512MB heap on memory-limited CI runners. 3g fits ubuntu-latest (7GB) comfortably.
org.gradle.jvmargs=-Xmx3g
