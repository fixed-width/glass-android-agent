name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verify the committed gradle-wrapper.jar matches a published Gradle release.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # The runner ships the Android SDK at $ANDROID_SDK_ROOT; ensure the exact
      # platform + build-tools (d8) the dex task needs are present.
      - name: Install Android SDK packages
        run: |
          sdk="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdk" --licenses > /dev/null 2>&1 || true
          "$sdk" "platforms;android-34" "build-tools;34.0.0"

      - name: Build, test, and dex
        run: ./gradlew test dex
