name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release and upload the jar asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Android SDK packages
        run: |
          sdk="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdk" --licenses > /dev/null 2>&1 || true
          "$sdk" "platforms;android-34" "build-tools;34.0.0"

      - name: Build, test, and dex
        run: ./gradlew test dex

      - name: Checksum the jar
        run: (cd build && sha256sum glass-agent.jar > glass-agent.jar.sha256)

      # Publish via the built-in gh CLI + automatic token (no third-party action).
      # $GITHUB_REF_NAME is the pushed tag (e.g. v0.1.0), passed as a shell env value.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            build/glass-agent.jar \
            build/glass-agent.jar.sha256
