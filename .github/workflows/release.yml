name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release and upload the jar asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Android SDK packages
        run: |
          sdk="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdk" --licenses > /dev/null 2>&1 || true
          "$sdk" "platforms;android-34" "build-tools;34.0.0"

      - name: Build, test, dex (agent) + assemble (a11y)
        run: ./gradlew :agent:test :agent:dex :a11y:testDebugUnitTest :a11y:assembleDebug

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp agent/build/glass-agent.jar dist/glass-agent.jar
          cp a11y/build/outputs/apk/debug/a11y-debug.apk dist/glass-a11y.apk
          (cd dist && sha256sum glass-agent.jar > glass-agent.jar.sha256)
          (cd dist && sha256sum glass-a11y.apk  > glass-a11y.apk.sha256)

      # Publish via the built-in gh CLI + automatic token (no third-party action).
      # $GITHUB_REF_NAME is the pushed tag (e.g. v0.2.0), passed as a shell env value.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/glass-agent.jar dist/glass-agent.jar.sha256 \
            dist/glass-a11y.apk  dist/glass-a11y.apk.sha256
